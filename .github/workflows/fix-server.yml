name: Fix Server - Stop Umami

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts 2>/dev/null

      - name: Stop Umami and restore iptables
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key $USER@$HOST 'bash -s' << 'SCRIPT'
          set -e
          echo "=== Stopping Umami containers ==="
          cd /opt/umami && docker compose down 2>/dev/null || true

          echo "=== Current memory ==="
          free -h

          echo "=== Current ports ==="
          ss -tlnp

          echo "=== Done, Umami stopped ==="
          SCRIPT
